help:
  text: |
    *❓ راهنما و سؤالات متداول*

    *AnonyChatMe چیست؟*
    ربات‌ی که به دیگران امکان می‌دهد پیام ناشناس برایتان بفرستند.

    *چطور پیام دریافت کنم؟*
    روی 📩 *دریافت پیام ناشناس* بزنید یا از /link استفاده کنید. لینک را به اشتراک بگذارید.

    *چطور پیام بفرستم؟*
    روی 📤 *ارسال پیام مستقیم* بزنید یا /send و لینک فرد موردنظر را بچسبانید.

    *آیا پیام‌ها واقعاً ناشناس هستند؟*
    بله. هویت هیچ‌کدام از طرفین فاش نمی‌شود.

    *آیا می‌توانم نام یا زبانم را تغییر دهم؟*
    بله — روی ⚙️ *تنظیمات* بزنید.


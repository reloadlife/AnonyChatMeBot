help:
  text: |
    *❓ راهنما و سؤالات متداول*

    *AnonyChatMe چیه؟*
    یه ربات که هرکسی میتونه بهت پیام ناشناس بفرسته — هیچکدومتون هویت دیگری رو نمیبینید\. جدی جدی\.

    *چطور پیام بگیرم؟*
    روی 📩 *لینک ناشناس من* بزن یا از /link استفاده کن\. لینکو بذار هرجا — بیو اینستا، توییتر، استوری\.

    *چطور پیام بفرستم؟*
    روی 📤 *ارسال پیام* بزن یا /send بنویس، بعد لینک طرفو بچسبون\.

    *پیام‌ها واقعاً ناشناسن؟*
    آره بابا\. هویت فرستنده هرگز به گیرنده نشون داده نمیشه، و بالعکس\. قول میدیم 🤞

    *میتونم جواب بدم؟*
    آره\. پیام رو باز کن و ↩️ *پاسخ* رو بزن\. جوابتم ناشناسه\.

    *میتونم دریافت پیام رو ببندم؟*
    آره — برو ⚙️ *تنظیمات* و دریافت رو خاموش کن\.

    *میتونم اسم یا زبانمو عوض کنم؟*
    آره — روی ⚙️ *تنظیمات* بزن\.


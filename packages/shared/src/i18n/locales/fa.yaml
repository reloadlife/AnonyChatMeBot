help:
  text: |
    *❓ راهنما و سؤالات متداول*

    *AnonyChatMe چیست؟*
    ربات‌ی که به هر کسی امکان می‌دهد پیام ناشناس برایتان بفرستد \\— هیچ‌کدام هویت دیگری را نمی‌بینند\.

    *چطور پیام دریافت کنم؟*
    روی 📩 *لینک ناشناس من* بزنید یا از /link استفاده کنید\. لینک را به اشتراک بگذارید\.

    *چطور پیام بفرستم؟*
    روی 📤 *ارسال پیام* بزنید یا /send بنویسید، سپس لینک فرد را بچسبانید\.

    *آیا پیام‌ها واقعاً ناشناس هستند؟*
    بله\. هویت فرستنده هرگز برای گیرنده فاش نمی‌شود، و بالعکس\.

    *می‌توانم به پیام دریافتی پاسخ دهم؟*
    بله\. پیام را باز کنید و روی ↩️ *پاسخ* بزنید\. پاسخ شما هم ناشناس می‌ماند\.

    *می‌توانم دریافت پیام را متوقف کنم؟*
    بله \\— به ⚙️ *تنظیمات* بروید و دریافت پیام را خاموش کنید\.

    *آیا می‌توانم نام یا زبانم را تغییر دهم؟*
    بله \\— روی ⚙️ *تنظیمات* بزنید\.


help:
  text: |
    *❓ المساعدة والأسئلة الشائعة*

    *ما هو AnonyChatMe؟*
    بوت للرسائل المجهولة \\— لا أنت ولا المرسل يرى هوية الآخر\.

    *كيف أستقبل الرسائل؟*
    اضغط على 📩 *رابطي المجهول* أو استخدم /link\. شارك الرابط في أي مكان\.

    *كيف أرسل رسالة؟*
    اضغط على 📤 *إرسال رسالة* أو /send، ثم الصق رابط الشخص\.

    *هل الرسائل مجهولة فعلاً؟*
    نعم\. هوية المرسل لا تُكشف للمستلم أبداً، والعكس صحيح\.

    *هل يمكنني الرد على رسالة تلقيتها؟*
    نعم\. افتح الرسالة واضغط ↩️ *رد*\. ردك سيبقى مجهولاً أيضاً\.

    *كيف أوقف استقبال الرسائل؟*
    اذهب إلى ⚙️ *الإعدادات* وأوقف استقبال الرسائل\.

    *هل يمكنني تغيير اسمي أو لغتي؟*
    نعم \\— اضغط على ⚙️ *الإعدادات*\.


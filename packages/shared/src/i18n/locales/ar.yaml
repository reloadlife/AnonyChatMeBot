help:
  text: |
    *❓ المساعدة والأسئلة الشائعة*

    *ما هو AnonyChatMe؟*
    بوت يتيح لك استقبال رسائل مجهولة — هوية المرسل لا تُكشف أبداً.

    *كيف أستقبل الرسائل؟*
    اضغط على 📩 *استقبال الرسائل* أو استخدم /link للحصول على رابطك. شاركه مع الآخرين.

    *كيف أرسل رسالة؟*
    اضغط على 📤 *إرسال رسالة مباشرة* أو /send والصق رابط الشخص.

    *هل الرسائل مجهولة فعلاً؟*
    نعم. هوية المرسل لا تُكشف أبداً.

    *هل يمكنني تغيير اسمي أو لغتي؟*
    نعم — اضغط على ⚙️ *الإعدادات*.


help:
  text: |
    *❓ المساعدة والأسئلة الشائعة*

    *شو هو AnonyChatMe؟*
    بوت رسائل مجهولة — لا أنت ولا المرسل يشوف هوية الثاني\. صج صج\.

    *كيف أستقبل رسائل؟*
    اضغط 📩 *رابطي المجهول* أو استخدم /link\. شارك الرابط في أي مكان — بايو إنستا، تويتر، ستوريز\.

    *كيف أرسل رسالة؟*
    اضغط 📤 *إرسال رسالة* أو /send، بعدين الصق رابط الشخص\.

    *الرسائل فعلاً مجهولة؟*
    إي والله\. هوية المرسل ما تنكشف أبداً للمستلم، والعكس صحيح\. وعد 🤞

    *أقدر أرد على رسالة؟*
    إي\. افتح الرسالة واضغط ↩️ *رد*\. ردك بعد مجهول\.

    *كيف أوقف الاستقبال؟*
    روح ⚙️ *الإعدادات* وأوقف الاستقبال\.

    *أقدر أغير اسمي أو لغتي؟*
    إي — اضغط ⚙️ *الإعدادات*\.


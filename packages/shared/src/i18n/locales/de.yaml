help:
  text: |
    *❓ Hilfe & FAQ*

    *Was ist AnonyChatMe?*
    Ein Bot für anonyme Nachrichten \\— weder du noch der Absender sehen die Identität des anderen\.

    *Wie empfange ich Nachrichten?*
    Tippe auf 📩 *Mein anonymer Link* oder nutze /link\. Teile den Link überall\.

    *Wie sende ich eine Nachricht?*
    Tippe auf 📤 *Nachricht senden* oder /send, dann füge den Link der Person ein\.

    *Sind Nachrichten wirklich anonym?*
    Ja\. Die Identität des Absenders wird dem Empfänger niemals preisgegeben, und umgekehrt\.

    *Kann ich auf eine erhaltene Nachricht antworten?*
    Ja\. Öffne die Nachricht und tippe auf ↩️ *Antworten*\. Die Antwort bleibt ebenfalls anonym\.

    *Wie stoppe ich den Empfang?*
    Gehe zu ⚙️ *Einstellungen* und deaktiviere den Nachrichtenempfang\.

    *Kann ich Name oder Sprache ändern?*
    Ja \\— tippe auf ⚙️ *Einstellungen*\.


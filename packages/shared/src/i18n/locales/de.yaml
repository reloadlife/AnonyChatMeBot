help:
  text: |
    *❓ Hilfe & FAQ*

    *Was ist AnonyChatMe?*
    Ein Bot, mit dem du anonyme Nachrichten empfangen kannst — der Absender bleibt immer anonym.

    *Wie empfange ich Nachrichten?*
    Tippe auf 📩 *Nachrichten empfangen* oder nutze /link für deinen persönlichen Link. Teile ihn.

    *Wie sende ich eine Nachricht?*
    Tippe auf 📤 *Direkte Nachricht senden* oder /send und füge den Link der Person ein.

    *Sind Nachrichten wirklich anonym?*
    Ja. Die Identität des Absenders wird nie preisgegeben.

    *Kann ich Name oder Sprache ändern?*
    Ja — tippe auf ⚙️ *Einstellungen*.


help:
  text: |
    *❓ Hilfe \\& FAQ*

    *was ist AnonyChatMe?*
    ein Bot für anonyme Nachrichten — weder du noch der Absender sehen die Identität des anderen\. echt jetzt\.

    *wie empfange ich Nachrichten?*
    tipp auf 📩 *Mein anonymer Link* oder nutze /link\. teil den Link überall — Insta\\-Bio, Twitter, Stories\.

    *wie sende ich eine Nachricht?*
    tipp auf 📤 *Nachricht senden* oder /send, dann füg den Link der Person ein\.

    *sind Nachrichten wirklich anonym?*
    ja\. die Identität des Absenders wird dem Empfänger nie gezeigt, und umgekehrt\. versprochen 🤞

    *kann ich auf eine erhaltene Nachricht antworten?*
    ja\. öffne die Nachricht und tipp auf ↩️ *Antworten*\. die Antwort ist auch anonym\.

    *wie stoppe ich den Empfang?*
    geh zu ⚙️ *Einstellungen* und deaktiviere den Empfang\.

    *kann ich Name oder Sprache ändern?*
    ja — tipp auf ⚙️ *Einstellungen*\.


help:
  text: |
    *❓ помощь и FAQ*

    *что такое AnonyChatMe?*
    бот для анонимных сообщений — ни ты, ни отправитель не видите личность друг друга\. реально\.

    *как получать сообщения?*
    нажми 📩 *Моя анонимная ссылка* или /link\. кинь ссылку куда угодно — инста, твиттер, сторис\.

    *как отправить сообщение?*
    нажми 📤 *Отправить сообщение* или /send, вставь ссылку человека\.

    *сообщения реально анонимные?*
    ага\. личность отправителя никогда не раскрывается получателю, и наоборот\. зуб даём 🤞

    *могу ответить на полученное сообщение?*
    да\. открой сообщение и нажми ↩️ *Ответить*\. ответ тоже анонимный\.

    *как остановить получение?*
    зайди в ⚙️ *Настройки* и отключи приём\.

    *можно изменить имя или язык?*
    да — нажми ⚙️ *Настройки*\.


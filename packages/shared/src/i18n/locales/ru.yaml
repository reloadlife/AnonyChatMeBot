help:
  text: |
    *❓ Помощь & FAQ*

    *Что такое AnonyChatMe?*
    Бот для анонимных сообщений \\— ни вы, ни отправитель не видите личность друг друга\.

    *Как получать сообщения?*
    Нажмите 📩 *Моя анонимная ссылка* или используйте /link\. Поделитесь ссылкой где угодно\.

    *Как отправить сообщение?*
    Нажмите 📤 *Отправить сообщение* или /send, затем вставьте ссылку получателя\.

    *Сообщения действительно анонимны?*
    Да\. Личность отправителя никогда не раскрывается получателю, и наоборот\.

    *Можно ответить на полученное сообщение?*
    Да\. Откройте сообщение и нажмите ↩️ *Ответить*\. Ответ тоже анонимный\.

    *Как остановить получение сообщений?*
    Зайдите в ⚙️ *Настройки* и отключите приём сообщений\.

    *Можно изменить имя или язык?*
    Да \\— нажмите ⚙️ *Настройки*\.


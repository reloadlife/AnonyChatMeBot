help:
  text: |
    *❓ Помощь и FAQ*

    *Что такое AnonyChatMe?*
    Бот, позволяющий получать анонимные сообщения — отправитель никогда не раскрывается.

    *Как получать сообщения?*
    Нажмите 📩 *Получить сообщения* или используйте /link, чтобы получить свою ссылку. Поделитесь ею.

    *Как отправить сообщение?*
    Нажмите 📤 *Отправить сообщение* или /send и вставьте ссылку получателя.

    *Сообщения действительно анонимны?*
    Да. Личность отправителя никогда не раскрывается.

    *Можно изменить имя или язык?*
    Да — нажмите ⚙️ *Настройки*.


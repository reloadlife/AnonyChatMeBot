help:
  text: |
    *❓ Aide & FAQ*

    *Qu'est-ce qu'AnonyChatMe ?*
    Un bot de messagerie anonyme \\— ni vous ni l'expéditeur ne voyez l'identité de l'autre\.

    *Comment recevoir des messages ?*
    Appuyez sur 📩 *Mon lien anonyme* ou utilisez /link\. Partagez le lien partout\.

    *Comment envoyer un message ?*
    Appuyez sur 📤 *Envoyer un message* ou /send, puis collez le lien de la personne\.

    *Les messages sont-ils vraiment anonymes ?*
    Oui\. L'identité de l'expéditeur n'est jamais révélée au destinataire, et vice versa\.

    *Puis-je répondre à un message reçu ?*
    Oui\. Ouvrez le message et appuyez sur ↩️ *Répondre*\. La réponse est aussi anonyme\.

    *Comment arrêter de recevoir des messages ?*
    Allez dans ⚙️ *Paramètres* et désactivez la réception des messages\.

    *Puis-je changer mon nom ou ma langue ?*
    Oui \\— appuyez sur ⚙️ *Paramètres*\.


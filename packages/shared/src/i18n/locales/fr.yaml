help:
  text: |
    *❓ Aide & FAQ*

    *Qu'est-ce qu'AnonyChatMe ?*
    Un bot qui permet de recevoir des messages anonymes — l'expéditeur reste toujours anonyme.

    *Comment recevoir des messages ?*
    Appuyez sur 📩 *Recevoir des messages* ou utilisez /link pour obtenir votre lien. Partagez-le.

    *Comment envoyer un message ?*
    Appuyez sur 📤 *Envoyer un message direct* ou /send et collez le lien de la personne.

    *Les messages sont-ils vraiment anonymes ?*
    Oui. L'identité de l'expéditeur n'est jamais révélée.

    *Puis-je changer mon nom ou ma langue ?*
    Oui — appuyez sur ⚙️ *Paramètres*.


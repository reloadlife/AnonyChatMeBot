help:
  text: |
    *❓ aide \\& FAQ*

    *c'est quoi AnonyChatMe ?*
    un bot de messages anonymes — ni toi ni l'expéditeur ne voient l'identité de l'autre\. pour de vrai\.

    *comment recevoir des messages ?*
    appuie sur 📩 *Mon lien anonyme* ou /link\. partage le lien partout — bio insta, twitter, stories\.

    *comment envoyer un message ?*
    appuie sur 📤 *Envoyer un message* ou /send, colle le lien de la personne\.

    *les messages sont vraiment anonymes ?*
    ouais\. l'identité de l'expéditeur n'est jamais révélée, et vice versa\. promis juré 🤞

    *je peux répondre à un message reçu ?*
    oui\. ouvre le message et appuie sur ↩️ *Répondre*\. ta réponse est aussi anonyme\.

    *comment arrêter de recevoir ?*
    va dans ⚙️ *Paramètres* et désactive la réception\.

    *je peux changer mon nom ou ma langue ?*
    oui — appuie sur ⚙️ *Paramètres*\.


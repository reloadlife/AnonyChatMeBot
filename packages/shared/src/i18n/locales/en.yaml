help:
  text: |
    *❓ Help & FAQ*

    *What is AnonyChatMe?*
    A bot that lets people send you anonymous messages — they never see your identity, and you never see theirs.

    *How do I receive messages?*
    Tap 📩 *I want to receive messages* or use /link to get your personal link. Share it anywhere.

    *How do I send a message?*
    Tap 📤 *Send direct message* or use /send and paste someone's link. Then type your message.

    *Are messages truly anonymous?*
    Yes. The sender's identity is never revealed to you, and yours is never revealed to them.

    *Can I change my name or language?*
    Yes — tap ⚙️ *Settings*.


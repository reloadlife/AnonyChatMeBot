help:
  text: |
    *❓ Help & FAQ*

    *What is AnonyChatMe?*
    A bot that lets anyone send you anonymous messages — neither of you ever sees the other's identity\.

    *How do I receive messages?*
    Tap 📩 *My anonymous link* or use /link to get your personal link\. Share it anywhere \\— social media, bio, wherever\.

    *How do I send a message?*
    Tap 📤 *Send a message* or use /send, then paste someone's link\. Type your message and it's delivered anonymously\.

    *Are messages truly anonymous?*
    Yes\. The sender's Telegram identity is never revealed to the recipient, and vice versa\.

    *Can I reply to a message I received?*
    Yes\. Open the message with 📖 *View message* and tap ↩️ *Reply*\. Your reply is also anonymous\.

    *Can I stop receiving messages?*
    Yes — go to ⚙️ *Settings* and toggle off message receiving\.

    *Can I change my name or language?*
    Yes — tap ⚙️ *Settings*\.

